name: Infrastructure

# Deploy is called by deploy.yml (which owns the ordering: CDK → API → Frontend).
# The diff job runs on its own for pull requests — it deploys nothing.
on:
  workflow_call:
  pull_request:
    branches: [ main, staging, dev ]
    paths:
      - 'cdk/**'
      - '.github/workflows/infra.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test pix-gateway
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: pix-gateway/go.mod
          cache-dependency-path: pix-gateway/go.sum

      - name: Run tests
        working-directory: pix-gateway
        run: go test ./... -race -count=1

  diff:
    name: CDK Diff
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Resolve environment
        id: env
        run: |
          case "${{ github.base_ref }}" in
            main)    echo "name=prod"  >> "$GITHUB_OUTPUT" ;;
            staging) echo "name=stage" >> "$GITHUB_OUTPUT" ;;
            *)       echo "name=dev"   >> "$GITHUB_OUTPUT" ;;
          esac

      # Go is required: the Reconcile stack bundles api/cmd/reconcile at synth time.
      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868899309401:role/ctech-wallet-gha-infra
          aws-region: us-east-1

      - name: Read ctech shared infrastructure values
        run: |
          ENV="${{ steps.env.outputs.name }}"
          echo "CTECH_VPC_ID=$(aws ssm get-parameter --name /ctech/${ENV}/network/vpc-id --query Parameter.Value --output text)" >> "$GITHUB_ENV"
          echo "CTECH_DEPLOYMENTS_BUCKET=$(aws ssm get-parameter --name /ctech/${ENV}/s3/deployments-bucket --query Parameter.Value --output text)" >> "$GITHUB_ENV"
          echo "CTECH_LOGS_BUCKET=$(aws ssm get-parameter --name /ctech/${ENV}/s3/logs-bucket --query Parameter.Value --output text)" >> "$GITHUB_ENV"

      - name: CDK Diff
        id: diff
        working-directory: cdk
        run: npx cdk diff --all 2>&1 | tee diff.txt
        env:
          ENVIRONMENT: ${{ steps.env.outputs.name }}
          CTECH_VPC_ID: ${{ env.CTECH_VPC_ID }}
          CTECH_DEPLOYMENTS_BUCKET: ${{ env.CTECH_DEPLOYMENTS_BUCKET }}
          CTECH_LOGS_BUCKET: ${{ env.CTECH_LOGS_BUCKET }}
          INTER_BASE_URL: ${{ vars[format('{0}_INTER_BASE_URL', steps.env.outputs.name)] }}
          INTER_PIX_KEY: ${{ vars[format('{0}_INTER_PIX_KEY', steps.env.outputs.name)] }}

      - name: Comment diff on PR
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('cdk/diff.txt', 'utf8');
            const body = `## CDK Diff (\`${{ steps.env.outputs.name }}\`)\n\`\`\`\n${diff.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  deploy:
    name: CDK Deploy
    runs-on: ubuntu-24.04-arm
    needs: test
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.event_name != 'pull_request' }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "name=prod"  >> "$GITHUB_OUTPUT" ;;
            staging) echo "name=stage" >> "$GITHUB_OUTPUT" ;;
            *)       echo "name=dev"   >> "$GITHUB_OUTPUT" ;;
          esac

      # Go is required: the Reconcile stack bundles api/cmd/reconcile at synth time.
      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868899309401:role/ctech-wallet-gha-infra
          aws-region: us-east-1

      - name: Read ctech shared infrastructure values
        run: |
          ENV="${{ steps.env.outputs.name }}"
          echo "CTECH_VPC_ID=$(aws ssm get-parameter --name /ctech/${ENV}/network/vpc-id --query Parameter.Value --output text)" >> "$GITHUB_ENV"
          echo "CTECH_DEPLOYMENTS_BUCKET=$(aws ssm get-parameter --name /ctech/${ENV}/s3/deployments-bucket --query Parameter.Value --output text)" >> "$GITHUB_ENV"
          echo "CTECH_LOGS_BUCKET=$(aws ssm get-parameter --name /ctech/${ENV}/s3/logs-bucket --query Parameter.Value --output text)" >> "$GITHUB_ENV"

      - name: CDK Deploy
        working-directory: cdk
        # CtechWallet-Global-OIDC is intentionally excluded by the env-scoped glob
        # (CtechWallet-Prod-* / -Stage-* / -Dev-*). CDK has no --exclude flag; the
        # global stack is deployed manually when the roles change.
        run: |
          ENV="${{ steps.env.outputs.name }}"
          npx cdk deploy "CtechWallet-${ENV^}-*" \
            --require-approval never
        env:
          ENVIRONMENT: ${{ steps.env.outputs.name }}
          CTECH_VPC_ID: ${{ env.CTECH_VPC_ID }}
          CTECH_DEPLOYMENTS_BUCKET: ${{ env.CTECH_DEPLOYMENTS_BUCKET }}
          CTECH_LOGS_BUCKET: ${{ env.CTECH_LOGS_BUCKET }}
          # Non-secret Inter settings, per environment (repository variables, not
          # secrets — the client/webhook secrets and mTLS PEMs live in SSM).
          INTER_BASE_URL: ${{ vars[format('{0}_INTER_BASE_URL', steps.env.outputs.name)] }}
          INTER_PIX_KEY: ${{ vars[format('{0}_INTER_PIX_KEY', steps.env.outputs.name)] }}
