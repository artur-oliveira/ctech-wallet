name: API

# Called by deploy.yml, which owns the trigger, the path filter and the
# CDK → API → Frontend ordering. Never triggered on push directly.
on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run tests
        working-directory: api
        run: go test ./... -race -count=1

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04-arm
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "name=prod"  >> "$GITHUB_OUTPUT" ;;
            staging) echo "name=stage" >> "$GITHUB_OUTPUT" ;;
            *)       echo "name=dev"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868899309401:role/ctech-wallet-gha-api
          aws-region: us-east-1

      - name: Build binary
        working-directory: api
        run: |
          SHORT_SHA="${{ github.sha }}"
          # Format: YYMMDDHHMM:<7-char commit> — consumed by the app via APP_VERSION
          VERSION="$(date -u '+%y%m%d%H%M'):${SHORT_SHA:0:7}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          # Filesystem-safe variant for the S3 artifact name (no ':')
          echo "ARTIFACT_VERSION=$(date -u '+%y%m%d%H%M')-${SHORT_SHA:0:7}" >> "$GITHUB_ENV"
          # The binary MUST be named `app` — deploy.sh and app.service expect it.
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o dist/app ./cmd/server
          # Ship the version as an env file inside the artifact; start.sh sources it
          # so the running app exposes it via APP_VERSION (health check).
          echo "APP_VERSION=${VERSION}" > dist/release.env

      - name: Package application
        working-directory: api
        run: |
          ARCHIVE="api-${ARTIFACT_VERSION}.zip"
          zip -j "${ARCHIVE}" dist/app dist/release.env
          echo "ARCHIVE_FILE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Read deployment config from SSM
        run: |
          ENVIRONMENT="${{ steps.env.outputs.name }}"
          BUCKET=$(aws ssm get-parameter --name "/ctech/$ENVIRONMENT/s3/deployments-bucket" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-ctech-deployments")
          ASG_NAME="${ENVIRONMENT}-ctech-wallet-v2-api"
          echo "DEPLOYMENTS_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "ASG_NAME=$ASG_NAME" >> $GITHUB_ENV

      - name: Upload to S3
        working-directory: api
        run: |
          # Versioned artifact (expires via the bucket lifecycle rule)
          aws s3 cp "$ARCHIVE_FILE" "s3://${DEPLOYMENTS_BUCKET}/ctech-wallet/api/${ARCHIVE_FILE}"

          # Overwrite current.zip so new ASG instances bootstrap this version
          aws s3 cp "$ARCHIVE_FILE" "s3://${DEPLOYMENTS_BUCKET}/ctech-wallet/api/current.zip"

      - name: Rolling deploy via SSM
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | tr '\t' ',')

          if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
            echo "No running instances found in ASG $ASG_NAME"
            exit 0
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_IDS" \
            --parameters "commands=['/opt/app/deploy.sh ctech-wallet/api/current.zip']" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for every instance to complete
          for INSTANCE_ID in $(echo $INSTANCE_IDS | tr ',' ' '); do
            echo "Waiting for $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text)

            if [ "$STATUS" != "Success" ]; then
              echo "Deploy failed on $INSTANCE_ID (status: $STATUS)"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            echo "$INSTANCE_ID deployed successfully"
          done
