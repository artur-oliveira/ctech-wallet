name: Deploy

# Single entry point for every deploy. Owns the trigger, the path filter and the
# ordering — infra.yml / api.yml / frontend.yml are reusable workflows and have
# no push trigger of their own, so a push that touches several of them still
# deploys strictly in order:
#
#   CDK → API → Frontend
#
# A stage whose paths did not change is skipped, and a skipped stage does NOT
# block the ones after it (`!contains(needs.*.result, 'failure')`). A stage that
# FAILS does block them.
on:
  push:
    branches: [ main, staging, dev ]
  workflow_dispatch:
    inputs:
      infra:
        description: 'Deploy CDK'
        type: boolean
        default: false
      api:
        description: 'Deploy API'
        type: boolean
        default: false
      frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: false

# One deploy at a time per branch, across all stages. Never cancel: a half-applied
# CloudFormation stack or a partial rolling deploy is worse than a queued run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    outputs:
      infra: ${{ steps.decide.outputs.infra }}
      api: ${{ steps.decide.outputs.api }}
      frontend: ${{ steps.decide.outputs.frontend }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            infra:
              - 'cdk/**'
              - 'pix-gateway/**'
              - '.github/workflows/infra.yml'
            api:
              - 'api/**'
              - '.github/workflows/api.yml'
            frontend:
              - 'ui/**'
              - '.github/workflows/frontend.yml'

      # On workflow_dispatch the checkboxes decide; on push, the path filter does.
      - name: Decide stages
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "infra=${{ inputs.infra }}"       >> "$GITHUB_OUTPUT"
            echo "api=${{ inputs.api }}"           >> "$GITHUB_OUTPUT"
            echo "frontend=${{ inputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "infra=${{ steps.filter.outputs.infra }}"       >> "$GITHUB_OUTPUT"
            echo "api=${{ steps.filter.outputs.api }}"           >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          fi

  infra:
    name: CDK
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}
    uses: ./.github/workflows/infra.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write

  api:
    name: API
    needs: [ changes, infra ]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.changes.outputs.api == 'true' }}
    uses: ./.github/workflows/api.yml
    permissions:
      id-token: write
      contents: read

  frontend:
    name: Frontend
    needs: [ changes, infra, api ]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/frontend.yml
    permissions:
      id-token: write
      contents: read
